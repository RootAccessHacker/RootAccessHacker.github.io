<!DOCTYPE html>
<html lang="{{ .Site.Language.LanguageCode | default "en" }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {{ partial "seo.html" . }}
  {{ partial "favicons.html" . }}
  {{ if or .Params.math .Site.Params.math.enabled }}{{ partial "math.html" . }}{{ end }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  {{ if .IsHome }}
    <link rel="stylesheet" href="{{ "css/home.css" | relURL }}">
  {{ else if and (eq .Kind "section") (eq .Section "blog") }}
    <link rel="stylesheet" href="{{ "css/home.css" | relURL }}">
    <link rel="stylesheet" href="{{ "css/research-search.css" | relURL }}">
  {{ else }}
    <link rel="stylesheet" href="{{ "css/post.css" | relURL }}">
    <link rel="stylesheet" href="{{ "css/hugo-post.css" | relURL }}">
  {{ end }}
</head>
<body>
  {{ block "main" . }}{{ end }}
</body>
</html>
